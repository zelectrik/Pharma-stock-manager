name: Database Migration Reminder

on:
  pull_request:
    paths:
      - "backend/prisma/migrations/**"
      - "backend/prisma/schema.prisma"

permissions:
  pull-requests: write
  contents: read

jobs:
  remind-database-migration:
    runs-on: ubuntu-latest

    steps:
      - name: Add migration reminder comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = `## ⚠️ Database migration detected

            This PR changes Prisma schema or migrations.

            Before merging:
            - Review \`migration.sql\`
            - Check for destructive operations: \`DROP TABLE\`, \`DROP COLUMN\`, required columns without defaults, relation changes
            - Confirm whether production data loss is acceptable

            After merge/deploy:
            - Run **Backend Production Migrations** manually from GitHub Actions
            - Verify production API after migration

            Manual workflow:
            \`Actions → Backend Production Migrations → Run workflow\`
            `;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
